<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — SmartMoves Swim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='%230EA5E9'/><text x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='white'>S</text></svg>" type="image/svg+xml" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --aqua: #0EA5E9;
      --navy: #1E3A5F;
      --navy-dark: #0F2A4A;
      --white: #ffffff;
      --gray-100: #F1F5F9;
      --gray-400: #94A3B8;
      --gray-500: #64748B;
      --gray-800: #1E293B;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--gray-800);
      background: var(--white);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100vh;
    }

    .page-404 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      background: linear-gradient(170deg, #F0F9FF 0%, var(--white) 40%, #F0F9FF 100%);
    }

    /* Animated water background */
    .water {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 35vh;
      background: linear-gradient(180deg, rgba(186,230,253,.0) 0%, rgba(186,230,253,.35) 40%, rgba(14,165,233,.15) 100%);
      overflow: hidden;
    }
    .water__wave {
      position: absolute;
      width: 200%;
      left: -50%;
    }
    .water__wave--1 {
      top: 0;
      animation: wave 7s ease-in-out infinite;
    }
    .water__wave--2 {
      top: 20px;
      animation: wave 9s ease-in-out infinite reverse;
      opacity: .5;
    }
    .water__wave--3 {
      top: 40px;
      animation: wave 11s ease-in-out infinite;
      opacity: .3;
    }

    @keyframes wave {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(3%); }
    }

    /* Floating bubbles */
    .bubbles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(14, 165, 233, .08);
      border: 1px solid rgba(14, 165, 233, .12);
      animation: rise linear infinite;
    }
    .bubble:nth-child(1) { width: 20px; height: 20px; left: 10%; bottom: -20px; animation-duration: 8s;  animation-delay: 0s; }
    .bubble:nth-child(2) { width: 14px; height: 14px; left: 25%; bottom: -20px; animation-duration: 10s; animation-delay: 1s; }
    .bubble:nth-child(3) { width: 24px; height: 24px; left: 45%; bottom: -20px; animation-duration: 7s;  animation-delay: 2s; }
    .bubble:nth-child(4) { width: 10px; height: 10px; left: 60%; bottom: -20px; animation-duration: 9s;  animation-delay: .5s; }
    .bubble:nth-child(5) { width: 18px; height: 18px; left: 78%; bottom: -20px; animation-duration: 11s; animation-delay: 3s; }
    .bubble:nth-child(6) { width: 12px; height: 12px; left: 90%; bottom: -20px; animation-duration: 8s;  animation-delay: 1.5s; }

    @keyframes rise {
      0%   { transform: translateY(0) scale(1);   opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: .6; }
      100% { transform: translateY(-100vh) scale(.6); opacity: 0; }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 0 24px;
      animation: fadeUp .8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Goggles illustration */
    .illustration {
      margin-bottom: 32px;
    }
    .illustration svg {
      width: 200px;
      height: auto;
    }

    .error-code {
      font-size: 7rem;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
      letter-spacing: -.04em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--navy) 30%, var(--aqua) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 12px;
    }

    .description {
      font-size: 1.05rem;
      color: var(--gray-500);
      max-width: 420px;
      margin: 0 auto 36px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      padding: 13px 30px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all .3s ease;
      text-decoration: none;
    }
    .btn--primary {
      background: var(--aqua);
      color: var(--white);
      border-color: var(--aqua);
    }
    .btn--primary:hover {
      background: #0284C7;
      border-color: #0284C7;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(14,165,233,.35);
    }
    .btn--ghost {
      background: transparent;
      color: var(--navy);
      border-color: var(--gray-100);
    }
    .btn--ghost:hover {
      border-color: var(--aqua);
      color: var(--aqua);
    }

    /* Brand in corner */
    .brand {
      position: absolute;
      top: 28px;
      left: 28px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--navy);
      text-decoration: none;
    }
    .brand strong { font-weight: 800; }
    .brand svg { width: 32px; height: 32px; }

    @media (max-width: 600px) {
      .error-code { font-size: 4.5rem; }
      .tagline { font-size: 1.2rem; }
      .description { font-size: .95rem; }
      .illustration svg { width: 150px; }
      .actions { flex-direction: column; align-items: center; }
      .btn { width: 100%; max-width: 260px; }
    }
  </style>
</head>
<body>
  <div class="page-404">
    <!-- Water background -->
    <div class="water">
      <svg class="water__wave water__wave--1" viewBox="0 0 1440 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 30C120 10 240 50 360 30S600 10 720 30S960 50 1080 30S1320 10 1440 30V60H0Z" fill="rgba(14,165,233,.12)"/>
      </svg>
      <svg class="water__wave water__wave--2" viewBox="0 0 1440 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 30C120 10 240 50 360 30S600 10 720 30S960 50 1080 30S1320 10 1440 30V60H0Z" fill="rgba(14,165,233,.08)"/>
      </svg>
      <svg class="water__wave water__wave--3" viewBox="0 0 1440 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 30C120 10 240 50 360 30S600 10 720 30S960 50 1080 30S1320 10 1440 30V60H0Z" fill="rgba(14,165,233,.06)"/>
      </svg>
    </div>

    <!-- Bubbles -->
    <div class="bubbles">
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
      <div class="bubble"></div>
    </div>

    <!-- Brand -->
    <a href="/" class="brand">
      <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="17" fill="#0EA5E9"/>
        <path d="M10 20c2-3 4-4 8-4s6 1 8 4" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M10 16c2-3 4-4 8-4s6 1 8 4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity=".5"/>
      </svg>
      <span>SmartMoves <strong>Swim</strong></span>
    </a>

    <!-- Content -->
    <div class="content">
      <!-- Swim goggles illustration -->
      <div class="illustration">
        <svg viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Left lens -->
          <ellipse cx="62" cy="58" rx="38" ry="32" stroke="#1E3A5F" stroke-width="4" fill="#F0F9FF"/>
          <ellipse cx="62" cy="58" rx="26" ry="20" fill="#BAE6FD" opacity=".5"/>
          <ellipse cx="56" cy="52" rx="8" ry="5" fill="#fff" opacity=".7" transform="rotate(-15 56 52)"/>
          <!-- Right lens -->
          <ellipse cx="138" cy="58" rx="38" ry="32" stroke="#1E3A5F" stroke-width="4" fill="#F0F9FF"/>
          <ellipse cx="138" cy="58" rx="26" ry="20" fill="#BAE6FD" opacity=".5"/>
          <ellipse cx="132" cy="52" rx="8" ry="5" fill="#fff" opacity=".7" transform="rotate(-15 132 52)"/>
          <!-- Bridge -->
          <path d="M100 52c-6 0-10 2-14 6" stroke="#1E3A5F" stroke-width="4" stroke-linecap="round" fill="none"/>
          <path d="M100 52c6 0 10 2 14 6" stroke="#1E3A5F" stroke-width="4" stroke-linecap="round" fill="none"/>
          <!-- Strap -->
          <path d="M24 54c-8-1-14 0-18 4" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round"/>
          <path d="M176 54c8-1 14 0 18 4" stroke="#0EA5E9" stroke-width="3" stroke-linecap="round"/>
          <!-- Tiny question mark in left lens -->
          <text x="55" y="65" font-family="Inter,sans-serif" font-size="22" font-weight="800" fill="#1E3A5F" opacity=".25" text-anchor="middle">?</text>
          <!-- Tiny question mark in right lens -->
          <text x="131" y="65" font-family="Inter,sans-serif" font-size="22" font-weight="800" fill="#1E3A5F" opacity=".25" text-anchor="middle">?</text>
        </svg>
      </div>

      <div class="error-code">404</div>
      <h1 class="tagline">Looks like you dove into the wrong lane</h1>
      <p class="description">The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>

      <div class="actions">
        <a href="/" class="btn btn--primary">Back to Homepage</a>
        <a href="/#demo" class="btn btn--ghost">Book a Demo</a>
      </div>
    </div>
  </div>
</body>
</html>
